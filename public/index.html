<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resource Harmony Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .sidebar-link { transition: all 0.15s ease; }
    .sidebar-link:hover, .sidebar-link.active { background: rgba(99, 102, 241, 0.12); color: #a5b4fc; }
    .sidebar-link.active { border-right: 3px solid #6366f1; }
    .card { transition: all 0.2s ease; }
    .card:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .gauge-bar { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .toast-enter { animation: toastIn 0.3s ease-out; }
    .toast-exit { animation: toastOut 0.3s ease-in forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(100%); } }
    .modal-backdrop { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    .heatmap-cell { transition: all 0.2s ease; }
    .heatmap-cell:hover { transform: scale(1.05); z-index: 10; }
    input[type="number"]::-webkit-inner-spin-button { opacity: 1; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="h-full bg-slate-50 text-slate-800">

<!-- Toast container -->
<div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 max-w-sm"></div>

<!-- Modal container -->

  <div id="modal-content" class="bg-white rounded-2xl shadow-2xl max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto"></div>
</div>

<!-- App shell -->
<div class="flex h-full">
  <!-- Sidebar -->
  <aside id="sidebar" class="w-64 bg-slate-900 text-slate-300 flex flex-col flex-shrink-0 h-screen sticky top-0">
    <div class="p-5 border-b border-slate-800">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-600/20">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        </div>
        <div>
          <h1 class="text-white font-bold text-sm tracking-tight">Resource Harmony</h1>
          <p class="text-[10px] text-slate-500 uppercase tracking-widest font-medium">Pro Edition</p>
        </div>
      </div>
    </div>
    <nav class="flex-1 py-4 px-3 space-y-1">
      <a href="/" data-route="/" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a href="/team" data-route="/team" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Team
      </a>
      <a href="/projects" data-route="/projects" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
        Projects
      </a>
      <a href="/planning" data-route="/planning" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Planning
      </a>
      <a href="/actuals" data-route="/actuals" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
        Actuals
      </a>
      <a href="/analytics" data-route="/analytics" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Analytics
      </a>
      <a href="/settings" data-route="/settings" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Settings
      </a>
    </nav>
    <div class="p-4 border-t border-slate-800">
      <div class="flex items-center gap-2 text-xs text-slate-500">
        <div id="sse-indicator" class="w-2 h-2 rounded-full bg-slate-600"></div>
        <span id="sse-status">Connecting...</span>
      </div>
      <a href="/__auth/logout" class="mt-3 flex items-center gap-2 text-xs text-slate-500 hover:text-slate-300 transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sign Out
      </a>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 overflow-y-auto h-screen">
    <div id="app" class="p-6 lg:p-8 max-w-7xl mx-auto"></div>
  </main>
</div>

<script>
// ==================== STATE ====================
const state = {
  teamMembers: [],
  projects: [],
  allocations: [],
  clients: [],
  snapshots: [],
  loading: true,
  currentRoute: '/',
  planningMonth: new Date().toISOString().slice(0, 7),
  actualsMonth: new Date().toISOString().slice(0, 7),
  projectFilter: 'all',
};

// ==================== API ====================
async function api(path, options = {}) {
  try {
    const resp = await fetch('/api/' + path, {
      ...options,
      headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: 'Request failed' }));
      const msg = typeof err.error === 'string' ? err.error : err.error?.message || err.message || 'Request failed';
      throw new Error(msg);
    }
    return resp.json();
  } catch (e) {
    showToast(e.message, 'error');
    throw e;
  }
}

async function loadAllData(silent = false) {
  if (!silent) state.loading = true;
  try {
    const [members, projects, allocations, clients, snapshots] = await Promise.all([
      api('team_members?order=name.asc'),
      api('rh_projects?order=tier.asc,name.asc'),
      api('allocations?order=period_month.desc,member_name.asc'),
      api('clients?order=name.asc'),
      api('monthly_snapshots?order=period.desc'),
    ]);
    state.teamMembers = members.data || members || [];
    state.projects = projects.data || projects || [];
    state.allocations = allocations.data || allocations || [];
    state.clients = clients.data || clients || [];
    state.snapshots = snapshots.data || snapshots || [];
  } catch (e) {
    console.error('Failed to load data:', e);
  }
  state.loading = false;
  if (!silent) render();
  else renderCurrentView();
}

// ==================== TOAST ====================
function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  const colors = {
    info: 'bg-slate-800 border-slate-700 text-white',
    success: 'bg-emerald-600 border-emerald-500 text-white',
    error: 'bg-red-600 border-red-500 text-white',
    warning: 'bg-amber-500 border-amber-400 text-white',
  };
  const icons = {
    info: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>',
    success: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>',
    error: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>',
    warning: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"/>',
  };
  toast.className = `toast-enter flex items-center gap-3 px-4 py-3 rounded-xl border shadow-lg text-sm font-medium ${colors[type]}`;
  toast.innerHTML = `<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">${icons[type]}</svg><span class="flex-1">${esc(message)}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.remove('toast-enter');
    toast.classList.add('toast-exit');
    setTimeout(() => toast.remove(), 300);
  }, 3500);
}

// ==================== MODAL ====================
function showModal(title, bodyHtml, footerHtml = '') {
  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  content.innerHTML = `
    <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
      <h3 class="text-lg font-semibold text-slate-900">${title}</h3>
      <button onclick="closeModal()" class="p-1 rounded-lg hover:bg-slate-100 transition-colors">
        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="px-6 py-4">${bodyHtml}</div>
    ${footerHtml ? `<div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-3">${footerHtml}</div>` : ''}
  `;
  overlay.classList.remove('hidden');
  overlay.classList.add('flex');
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('hidden');
  overlay.classList.remove('flex');
}

function showConfirm(title, message, onConfirm) {
  showModal(title, `<p class="text-slate-600 text-sm">${message}</p>`,
    `<button onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">Cancel</button>
     <button id="confirm-btn" class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg transition-colors">Delete</button>`
  );
  document.getElementById('confirm-btn').onclick = () => { closeModal(); onConfirm(); };
}

// ==================== ROUTER ====================
function navigate(path) {
  if (path === state.currentRoute) return;
  history.pushState(null, '', path);
  state.currentRoute = path;
  render();
}

window.addEventListener('popstate', () => {
  state.currentRoute = location.pathname;
  render();
});

document.addEventListener('click', (e) => {
  const link = e.target.closest('a[data-route]');
  if (link) {
    e.preventDefault();
    navigate(link.getAttribute('data-route') || link.getAttribute('href'));
  }
});

// Close modal on backdrop click
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// ==================== SSE ====================
let sseRetryDelay = 2000;
let _lastMutationAt = 0;
const MUTATION_COOLDOWN = 5000; // Suppress SSE reloads for 5s after local mutation
function markMutation() { _lastMutationAt = Date.now(); }

function connectSSE() {
  const sse = new EventSource('/api/sse');
  sse.addEventListener('change', (e) => {
    try {
      const event = JSON.parse(e.data);
      if (event.table) {
        // Skip reload if we just made a mutation ourselves (avoids flash)
        if (Date.now() - _lastMutationAt < MUTATION_COOLDOWN) return;
        loadAllData(true);
      }
    } catch {}
    sseRetryDelay = 2000;
  });
  sse.onopen = () => {
    sseRetryDelay = 2000;
    const ind = document.getElementById('sse-indicator');
    const status = document.getElementById('sse-status');
    if (ind) { ind.className = 'w-2 h-2 rounded-full bg-emerald-400'; }
    if (status) { status.textContent = 'Live'; }
  };
  sse.onerror = () => {
    sse.close();
    const ind = document.getElementById('sse-indicator');
    const status = document.getElementById('sse-status');
    if (ind) { ind.className = 'w-2 h-2 rounded-full bg-red-400'; }
    if (status) { status.textContent = 'Reconnecting...'; }
    setTimeout(connectSSE, sseRetryDelay);
    sseRetryDelay = Math.min(sseRetryDelay * 2, 30000);
  };
}
connectSSE();

// ==================== HELPERS ====================
function esc(str) { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }
function pct(val, max) { return max > 0 ? Math.round((val / max) * 100) : 0; }
function fmtNum(n) { return (n || 0).toLocaleString(); }
function fmtCurrency(n) { return 'R' + (n || 0).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
function fmtPct(n) { return (n || 0).toFixed(1) + '%'; }
function initials(name) {
  if (!name) return '??';
  const parts = name.trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  return parts[0].slice(0, 2).toUpperCase();
}
function stabilityBadge(stability) {
  const s = (stability || '').toUpperCase();
  if (s === 'STABLE') return '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold bg-emerald-100 text-emerald-700">STABLE</span>';
  if (s === 'MODERATE') return '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold bg-amber-100 text-amber-700">MODERATE</span>';
  if (s === 'VOLATILE') return '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold bg-red-100 text-red-700">VOLATILE</span>';
  return '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold bg-slate-100 text-slate-600">' + esc(s || 'N/A') + '</span>';
}
function tierBadge(tier) {
  const t = parseInt(tier) || 0;
  if (t === 1) return '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold bg-indigo-100 text-indigo-700">Tier 1</span>';
  if (t === 2) return '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold bg-blue-100 text-blue-700">Tier 2</span>';
  if (t === 3) return '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold bg-slate-100 text-slate-600">Tier 3</span>';
  return '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold bg-slate-100 text-slate-600">Tier ' + t + '</span>';
}
function utilizationColor(pct) {
  if (pct >= 95) return 'bg-red-500';
  if (pct >= 85) return 'bg-amber-500';
  if (pct >= 70) return 'bg-emerald-500';
  if (pct >= 50) return 'bg-blue-500';
  return 'bg-slate-300';
}
function utilizationTextColor(pct) {
  if (pct >= 95) return 'text-red-600';
  if (pct >= 85) return 'text-amber-600';
  if (pct >= 70) return 'text-emerald-600';
  return 'text-slate-500';
}
const avatarColors = [
  'from-indigo-500 to-purple-500', 'from-emerald-500 to-teal-500', 'from-amber-500 to-orange-500',
  'from-pink-500 to-rose-500', 'from-cyan-500 to-blue-500', 'from-violet-500 to-fuchsia-500',
  'from-lime-500 to-green-500', 'from-red-500 to-pink-500',
];
function avatarGradient(name) {
  let hash = 0;
  for (let i = 0; i < (name || '').length; i++) hash = ((hash << 5) - hash) + name.charCodeAt(i);
  return avatarColors[Math.abs(hash) % avatarColors.length];
}
function getMonths() {
  const months = new Set();
  for (let i = 0; i < state.allocations.length; i++) {
    if (state.allocations[i].period_month) months.add(state.allocations[i].period_month);
  }
  return Array.from(months).sort().reverse();
}

// ==================== RENDER ====================
function render() {
  state.currentRoute = location.pathname;
  // Update sidebar active state
  const links = document.querySelectorAll('[data-route]');
  for (let i = 0; i < links.length; i++) {
    const r = links[i].getAttribute('data-route');
    if (r === state.currentRoute || (state.currentRoute === '/' && r === '/')) {
      links[i].classList.add('active');
    } else {
      links[i].classList.remove('active');
    }
  }
  renderCurrentView();
}

function renderCurrentView() {
  const app = document.getElementById('app');
  if (state.loading) {
    app.innerHTML = `<div class="flex items-center justify-center h-64"><div class="text-slate-400 text-sm">Loading data...</div></div>`;
    return;
  }
  const route = state.currentRoute;
  if (route === '/') renderDashboard(app);
  else if (route === '/team') renderTeam(app);
  else if (route === '/projects') renderProjects(app);
  else if (route === '/planning') renderPlanning(app);
  else if (route === '/actuals') renderActuals(app);
  else if (route === '/analytics') renderAnalytics(app);
  else if (route === '/settings') renderSettings(app);
  else renderDashboard(app);
}

// ==================== DASHBOARD ====================
function renderDashboard(el) {
  const members = state.teamMembers;
  const projects = state.projects;
  const allocs = state.allocations;
  const snaps = state.snapshots;

  const totalCapacity = members.reduce((s, m) => s + (parseFloat(m.monthly_capacity) || 0), 0);
  const totalPlanned = allocs.reduce((s, a) => s + (parseFloat(a.planned_hours) || 0), 0);
  const totalActual = allocs.reduce((s, a) => s + (parseFloat(a.actual_hours) || 0), 0);
  const utilPct = totalCapacity > 0 ? (totalPlanned / totalCapacity * 100) : 0;
  const latestSnap = snaps.length > 0 ? snaps[0] : {};
  const prevSnap = snaps.length > 1 ? snaps[1] : null;
  const revenue = parseFloat(latestSnap.planned_revenue) || 0;

  // Month-over-month deltas
  const prevCapacity = prevSnap ? parseFloat(prevSnap.total_capacity) || 0 : null;
  const prevPlanned = prevSnap ? parseFloat(prevSnap.total_planned) || 0 : null;
  const prevActual = prevSnap ? parseFloat(prevSnap.total_actual) || 0 : null;
  const prevUtil = prevSnap ? parseFloat(prevSnap.company_utilization) || 0 : null;
  const prevRevenue = prevSnap ? parseFloat(prevSnap.planned_revenue) || 0 : null;
  const curCapacity = parseFloat(latestSnap.total_capacity) || 0;
  const curPlanned = parseFloat(latestSnap.total_planned) || 0;
  const curActual = parseFloat(latestSnap.total_actual) || 0;
  const curUtil = parseFloat(latestSnap.company_utilization) || 0;

  function deltaHtml(current, previous, fmt, suffix, invert) {
    if (previous === null) return '';
    const diff = current - previous;
    if (Math.abs(diff) < 0.01) return '';
    const isPositive = diff > 0;
    const isGood = invert ? !isPositive : isPositive;
    const arrow = isPositive ? '&#x25B2;' : '&#x25BC;';
    const color = isGood ? 'text-emerald-600 bg-emerald-50' : 'text-red-600 bg-red-50';
    const sign = isPositive ? '+' : '';
    return '<span class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-full text-[10px] font-semibold ' + color + '">' + arrow + ' ' + sign + fmt(diff) + (suffix || '') + '</span>';
  }

  // Team utilization per member
  const memberUtils = [];
  for (let i = 0; i < members.length; i++) {
    const m = members[i];
    let planned = 0;
    for (let j = 0; j < allocs.length; j++) {
      if (allocs[j].member_id === m.id || allocs[j].member_name === m.name) {
        planned += parseFloat(allocs[j].planned_hours) || 0;
      }
    }
    const cap = parseFloat(m.monthly_capacity) || 160;
    const uPct = cap > 0 ? (planned / cap * 100) : 0;
    memberUtils.push({ name: m.name, planned, capacity: cap, utilization: uPct, isAtCapacity: m.is_at_capacity, stability: m.stability_score });
  }

  // Project tier distribution
  let tier1 = 0, tier2 = 0, tier3 = 0;
  for (let i = 0; i < projects.length; i++) {
    const t = parseInt(projects[i].tier) || 0;
    if (t === 1) tier1++;

    else tier3++;

  for (let i = 0; i < members.length; i++) {

    if (s === 'STABLE') stableCount++;
    else if (s === 'MODERATE') moderateCount++;
    else volatileCount++;
  }

  el.innerHTML = `<div class="fade-in">

          <div class="w-8 h-8 rounded-lg bg-indigo-50 flex items-center justify-center">
            <svg class="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <div class="text-2xl font-bold text-slate-900">${members.length}</div>
          ${deltaHtml(curCapacity, prevCapacity, fmtNum, 'h', false)}
        </div>
        <div class="text-xs text-slate-400 mt-1">${fmtNum(totalCapacity)} hrs capacity</div>
      </div>
      <div class="card bg-white rounded-xl p-5 border border-slate-200 shadow-sm">
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs font-medium text-slate-500 uppercase tracking-wider">Planned Hours</span>
          <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center">
            <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <div class="text-2xl font-bold text-slate-900">${fmtNum(curPlanned)}</div>
          ${deltaHtml(curPlanned, prevPlanned, fmtNum, 'h', false)}
        </div>
        <div class="text-xs text-slate-400 mt-1">across ${projects.length} projects</div>

        <div class="flex items-center gap-2">
          <div class="text-2xl font-bold ${utilizationTextColor(curUtil)}">${fmtPct(curUtil)}</div>

            <svg class="w-4 h-4 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>

        <div class="flex items-center gap-2">

    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">

// ==================== TEAM ====================
function renderTeam(el) {
  const members = state.teamMembers;
  // Compute per-member stats
  const memberStats = [];
  for (let i = 0; i < members.length; i++) {
    const m = members[i];
    let planned = 0;
    const projectMap = {};
    for (let j = 0; j < state.allocations.length; j++) {
      const a = state.allocations[j];
      if (a.member_id === m.id || a.member_name === m.name) {
        planned += parseFloat(a.planned_hours) || 0;
        if (a.project_name) {
          projectMap[a.project_name] = (projectMap[a.project_name] || 0) + (parseFloat(a.planned_hours) || 0);
        }
      }
    }
    const cap = parseFloat(m.monthly_capacity) || 160;
    memberStats.push({ ...m, totalPlanned: planned, capacity: cap, utilization: cap > 0 ? (planned / cap * 100) : 0, projectBreakdown: projectMap });
  }

  // Risk: single points of failure (only 1 person on a project)
  const projectMemberCounts = {};
  for (let i = 0; i < state.allocations.length; i++) {
    const a = state.allocations[i];
    if (!projectMemberCounts[a.project_name]) projectMemberCounts[a.project_name] = new Set();
    if (a.member_name) projectMemberCounts[a.project_name].add(a.member_name);
  }
  const spofProjects = [];
  const keys = Object.keys(projectMemberCounts);
  for (let i = 0; i < keys.length; i++) {
    if (projectMemberCounts[keys[i]].size === 1) {
      spofProjects.push({ project: keys[i], member: Array.from(projectMemberCounts[keys[i]])[0] });
    }
  }

  el.innerHTML = `<div class="fade-in">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-2xl font-bold text-slate-900">Team Management</h2>
        <p class="text-sm text-slate-500 mt-1">${members.length} team members</p>
      </div>
      <button onclick="showAddMemberModal()" class="inline-flex items-center gap-2 px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-xl transition-colors shadow-sm shadow-indigo-600/20">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add Member
      </button>
    </div>

    ${spofProjects.length > 0 ? `
    <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6 flex items-start gap-3">
      <svg class="w-5 h-5 text-amber-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
      <div>
        <p class="text-sm font-semibold text-amber-800">Single Points of Failure Detected</p>
        <p class="text-xs text-amber-700 mt-1">${spofProjects.map(s => `<strong>${esc(s.member)}</strong> is the sole resource on <em>${esc(s.project)}</em>`).join(' &bull; ')}</p>
      </div>
    </div>` : ''}

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
      ${memberStats.map(m => {
        const projEntries = Object.entries(m.projectBreakdown).sort((a, b) => b[1] - a[1]);
        return `
        <div class="card bg-white rounded-xl border border-slate-200 shadow-sm p-5">
          <div class="flex items-start justify-between mb-4">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-xl bg-gradient-to-br ${avatarGradient(m.name)} flex items-center justify-center text-white font-bold text-xs shadow-sm">${initials(m.name)}</div>
              <div>
                <h4 class="font-semibold text-slate-900 text-sm">${esc(m.name)}</h4>
                <p class="text-xs text-slate-500">${esc(m.role || 'Team Member')}</p>
              </div>
            </div>
            <div class="flex items-center gap-1">
              <button onclick="showEditMemberModal('${m.id}')" class="p-1.5 rounded-lg hover:bg-slate-100 transition-colors" title="Edit">
                <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
              </button>
              <button onclick="deleteMember('${m.id}', '${esc(m.name)}')" class="p-1.5 rounded-lg hover:bg-red-50 transition-colors" title="Delete">
                <svg class="w-3.5 h-3.5 text-slate-400 hover:text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
          </div>
          <div class="flex items-center gap-2 mb-3">
            ${stabilityBadge(m.stability_score)}
            ${m.cv_percentage ? `<span class="text-[10px] text-slate-500">CV: ${parseFloat(m.cv_percentage).toFixed(1)}%</span>` : ''}
            ${m.is_at_capacity ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold bg-red-100 text-red-700">AT CAPACITY</span>' : ''}

            </div>
            <div class="w-full bg-slate-100 rounded-full h-2">
              <div class="h-2 rounded-full gauge-bar ${utilizationColor(m.utilization)}" style="width: ${Math.min(m.utilization, 100)}%"></div>
            </div>
            <div class="flex justify-between text-[10px] text-slate-400 mt-1">
              <span>${fmtNum(m.totalPlanned)}h planned</span>
              <span>${fmtNum(m.capacity)}h capacity</span>
            </div>
          </div>
          ${projEntries.length > 0 ? `
          <div class="border-t border-slate-100 pt-3 mt-3">
            <p class="text-[10px] font-medium text-slate-500 uppercase tracking-wider mb-2">Projects</p>
            <div class="space-y-1.5">
              ${projEntries.slice(0, 4).map(([pname, hrs]) => `
                <div class="flex items-center justify-between">
                  <span class="text-xs text-slate-600 truncate mr-2">${esc(pname)}</span>
                  <span class="text-xs font-medium text-slate-900">${fmtNum(hrs)}h</span>
                </div>
              `).join('')}
              ${projEntries.length > 4 ? `<span class="text-[10px] text-slate-400">+${projEntries.length - 4} more</span>` : ''}
            </div>
          </div>` : ''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function showEditMemberModal(id) {
  let member = null;
  for (let i = 0; i < state.teamMembers.length; i++) {
    if (state.teamMembers[i].id === id) { member = state.teamMembers[i]; break; }
  }
  if (!member) return;
  showModal('Edit Team Member', memberFormHtml(member),
    `<button onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">Cancel</button>
     <button onclick="saveMember('${id}')" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors">Save Changes</button>`

async function saveMember(id) {
  const data = {
    name: document.getElementById('mf-name').value,
    email: document.getElementById('mf-email').value,
    role: document.getElementById('mf-role').value,
    department: document.getElementById('mf-department').value,
    monthly_capacity: parseInt(document.getElementById('mf-capacity').value) || 160,
    hourly_rate: parseFloat(document.getElementById('mf-rate').value) || 0,
    stability_score: document.getElementById('mf-stability').value,
    utilization_target_min: parseInt(document.getElementById('mf-util-min').value) || 70,
    utilization_target_max: parseInt(document.getElementById('mf-util-max').value) || 90,
    is_active: true,
  };
  if (!data.name || !data.email) { showToast('Name and email are required', 'warning'); return; }
  try {
    if (id) {
      await api('team_members/' + id, { method: 'PUT', body: JSON.stringify(data) });
      showToast('Member updated successfully', 'success');
    } else {
      await api('team_members', { method: 'POST', body: JSON.stringify(data) });
      showToast('Member added successfully', 'success');
    }
    closeModal();
    markMutation();
    await loadAllData(true);
  } catch {}
}

function deleteMember(id, name) {
  showConfirm('Delete Team Member', `Are you sure you want to delete <strong>${name}</strong>? This action cannot be undone.`, async () => {
    try {
      await api('team_members/' + id, { method: 'DELETE' });
      showToast('Member deleted', 'success');
      markMutation();
      await loadAllData(true);
    } catch {}
  });
}

// ==================== PROJECTS ====================
function renderProjects(el) {
  const projects = state.projects;
  const filter = state.projectFilter;

  let filtered = projects;
  if (filter !== 'all') {
    filtered = [];
    for (let i = 0; i < projects.length; i++) {
      if (String(projects[i].tier) === filter) filtered.push(projects[i]);
    }
  }

  // Group by tier
  const tiers = { 1: [], 2: [], 3: [] };
  for (let i = 0; i < filtered.length; i++) {
    const t = parseInt(filtered[i].tier) || 3;
    if (!tiers[t]) tiers[t] = [];
    tiers[t].push(filtered[i]);
  }

  const tierLabels = { 1: 'Tier 1: Strategic', 2: 'Tier 2: Active', 3: 'Tier 3: Support' };
  const tierColors = { 1: 'border-l-indigo-500', 2: 'border-l-blue-500', 3: 'border-l-slate-400' };

  // Count members per project
  const projMembers = {};
  for (let i = 0; i < state.allocations.length; i++) {
    const a = state.allocations[i];
    if (!projMembers[a.project_id]) projMembers[a.project_id] = new Set();
    if (a.member_name) projMembers[a.project_id].add(a.member_name);
  }

  el.innerHTML = `<div class="fade-in">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-2xl font-bold text-slate-900">Project Portfolio</h2>
        <p class="text-sm text-slate-500 mt-1">${projects.length} projects across ${Object.keys(tierLabels).length} tiers</p>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="state.projectFilter='all'; renderCurrentView()" class="px-3 py-1.5 text-xs font-medium rounded-lg transition-colors ${filter === 'all' ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'}">All</button>
        <button onclick="state.projectFilter='1'; renderCurrentView()" class="px-3 py-1.5 text-xs font-medium rounded-lg transition-colors ${filter === '1' ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'}">Tier 1</button>
        <button onclick="state.projectFilter='2'; renderCurrentView()" class="px-3 py-1.5 text-xs font-medium rounded-lg transition-colors ${filter === '2' ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'}">Tier 2</button>
        <button onclick="state.projectFilter='3'; renderCurrentView()" class="px-3 py-1.5 text-xs font-medium rounded-lg transition-colors ${filter === '3' ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'}">Tier 3</button>
      </div>
    </div>

    ${[1, 2, 3].map(tier => {
      const items = tiers[tier] || [];
      if (items.length === 0) return '';
      return `
      <div class="mb-8">
        <h3 class="text-sm font-semibold text-slate-700 uppercase tracking-wider mb-4">${tierLabels[tier]}</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
          ${items.map(p => {
            const members = projMembers[p.id] ? projMembers[p.id].size : 0;
            const budgetUsed = p.total_hours_5m && p.budget_hours ? pct(parseFloat(p.total_hours_5m), parseFloat(p.budget_hours)) : 0;
            return `
            <div class="card bg-white rounded-xl border border-slate-200 border-l-4 ${tierColors[tier]} shadow-sm p-5">
              <div class="flex items-start justify-between mb-3">
                <div class="flex items-center gap-2">
                  <div class="w-3 h-3 rounded-full" style="background-color: ${p.color || '#6366f1'}"></div>
                  <h4 class="font-semibold text-slate-900 text-sm">${esc(p.name)}</h4>
                </div>
                ${tierBadge(p.tier)}
              </div>
              <p class="text-xs text-slate-500 mb-3">${esc(p.client_name || 'No client')}</p>
              <div class="flex items-center gap-2 mb-3 flex-wrap">
                ${stabilityBadge(p.stability)}
                ${p.cv_percentage ? `<span class="text-[10px] text-slate-500">CV: ${parseFloat(p.cv_percentage).toFixed(1)}%</span>` : ''}
                <span class="text-[10px] text-slate-500">${members} team member${members !== 1 ? 's' : ''}</span>
              </div>
              ${p.budget_hours ? `
              <div class="mb-2">
                <div class="flex items-center justify-between text-[10px] text-slate-500 mb-1">
                  <span>Budget</span>
                  <span>${fmtNum(parseFloat(p.total_hours_5m || 0))} / ${fmtNum(parseFloat(p.budget_hours))} hrs</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-1.5">
                  <div class="h-1.5 rounded-full gauge-bar ${budgetUsed > 90 ? 'bg-red-500' : budgetUsed > 70 ? 'bg-amber-500' : 'bg-emerald-500'}" style="width: ${Math.min(budgetUsed, 100)}%"></div>
                </div>
              </div>` : ''}
              ${p.start_date || p.end_date ? `<p class="text-[10px] text-slate-400">${esc(p.start_date || '')} — ${esc(p.end_date || 'Ongoing')}</p>` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ==================== PLANNING ====================
function renderPlanning(el) {
  const months = getMonths();
  const selectedMonth = state.planningMonth;
  const members = state.teamMembers;
  const projects = state.projects;

  // Filter allocations for selected month
  const monthAllocs = [];
  for (let i = 0; i < state.allocations.length; i++) {
    if (state.allocations[i].period_month === selectedMonth) monthAllocs.push(state.allocations[i]);
  }

  // Build matrix: member -> project -> planned_hours
  const matrix = {};
  for (let i = 0; i < members.length; i++) matrix[members[i].id] = {};
  for (let i = 0; i < monthAllocs.length; i++) {
    const a = monthAllocs[i];
    if (matrix[a.member_id]) {
      matrix[a.member_id][a.project_id] = { planned: parseFloat(a.planned_hours) || 0, id: a.id };
    }
  }

  // Compute row totals
  const rowTotals = {};
  for (let i = 0; i < members.length; i++) {
    const m = members[i];
    let total = 0;
    const projKeys = Object.keys(matrix[m.id] || {});
    for (let j = 0; j < projKeys.length; j++) total += matrix[m.id][projKeys[j]].planned;
    const cap = parseFloat(m.monthly_capacity) || 160;
    rowTotals[m.id] = { planned: total, capacity: cap, variance: cap - total, utilization: cap > 0 ? (total / cap * 100) : 0 };
  }

  el.innerHTML = `<div class="fade-in">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-2xl font-bold text-slate-900">Monthly Planning</h2>
        <p class="text-sm text-slate-500 mt-1">Allocate planned hours by team member and project</p>
      </div>
      <div class="flex items-center gap-3">
        <select id="planning-month" onchange="state.planningMonth = this.value; renderCurrentView()" class="px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30">
          ${months.map(m => `<option value="${m}" ${m === selectedMonth ? 'selected' : ''}>${m}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-200 bg-slate-50/50">
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider sticky left-0 bg-slate-50/50 z-10 min-w-[160px]">Team Member</th>
              ${projects.map(p => `<th class="px-3 py-3 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider min-w-[90px]"><div class="flex items-center justify-center gap-1"><div class="w-2 h-2 rounded-full" style="background: ${p.color || '#6366f1'}"></div><span class="truncate">${esc((p.name || '').length > 12 ? p.name.slice(0, 12) + '..' : p.name)}</span></div></th>`).join('')}
              <th class="px-3 py-3 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider bg-slate-100/80">Planned</th>
              <th class="px-3 py-3 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider bg-slate-100/80">Capacity</th>
              <th class="px-3 py-3 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider bg-slate-100/80">Variance</th>
              <th class="px-3 py-3 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider bg-slate-100/80">Util %</th>
            </tr>
          </thead>
          <tbody>
            ${members.map(m => {
              const rt = rowTotals[m.id];
              const utilClass = rt.utilization >= 95 ? 'text-red-600 font-bold' : rt.utilization >= 85 ? 'text-amber-600 font-semibold' : rt.utilization >= 70 ? 'text-emerald-600' : 'text-slate-500';
              const rowBg = rt.utilization >= 95 ? 'bg-red-50/30' : '';
              return `
              <tr class="border-b border-slate-50 hover:bg-slate-50/50 ${rowBg}">
                <td class="px-4 py-2.5 sticky left-0 bg-white z-10">
                  <div class="flex items-center gap-2">
                    <div class="w-7 h-7 rounded-lg bg-gradient-to-br ${avatarGradient(m.name)} flex items-center justify-center text-white font-bold text-[10px]">${initials(m.name)}</div>
                    <span class="text-sm font-medium text-slate-800">${esc(m.name.split(' ')[0])}</span>
                  </div>
                </td>
                ${projects.map(p => {
                  const cell = (matrix[m.id] || {})[p.id];
                  const val = cell ? cell.planned : 0;
                  const cellColorClass = val > 0 ? (rt.utilization >= 95 ? 'bg-red-50' : rt.utilization >= 85 ? 'bg-amber-50' : 'bg-emerald-50') : '';
                  return `<td class="px-0.5 py-0.5 text-center">
                    <div id="plan-wrap-${m.id}-${p.id}" data-plan-wrap-member="${m.id}" class="rounded ${cellColorClass}">
                      <input type="number" min="0" max="999" step="4" value="${val || ''}" placeholder="—"
                        id="plan-cell-${m.id}-${p.id}" data-plan-member="${m.id}"
                        class="w-14 text-center text-xs px-1 py-1.5 border border-transparent rounded focus:border-indigo-300 focus:outline-none bg-transparent ${val > 0 ? 'font-medium text-indigo-700' : 'text-slate-400'}"
                        onchange="planCellChange('${m.id}', '${p.id}', '${selectedMonth}', '${m.name}', '${esc(p.name)}', ${cell ? "'" + cell.id + "'" : 'null'})">
                    </div>
                  </td>`;
                }).join('')}
                <td id="plan-total-${m.id}" class="px-3 py-2.5 text-center font-semibold text-slate-900 bg-slate-50/50">${fmtNum(rt.planned)}</td>
                <td class="px-3 py-2.5 text-center text-slate-600 bg-slate-50/50">${fmtNum(rt.capacity)}</td>
                <td id="plan-variance-${m.id}" class="px-3 py-2.5 text-center ${rt.variance < 0 ? 'text-red-600 font-semibold' : 'text-emerald-600'} bg-slate-50/50">${rt.variance > 0 ? '+' : ''}${fmtNum(rt.variance)}</td>
                <td id="plan-util-${m.id}" class="px-3 py-2.5 text-center ${utilClass} bg-slate-50/50">${fmtPct(rt.utilization)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

async function updateAllocation(memberId, projectId, month, value, memberName, projectName, existingId) {
  const hours = parseFloat(value) || 0;
  try {
    if (existingId && hours > 0) {
      await api('allocations/' + existingId, { method: 'PUT', body: JSON.stringify({ planned_hours: hours }) });
    } else if (existingId && hours === 0) {
      await api('allocations/' + existingId, { method: 'DELETE' });
    } else if (hours > 0) {
      await api('allocations', { method: 'POST', body: JSON.stringify({
        member_id: memberId, project_id: projectId, period_month: month,
        planned_hours: hours, actual_hours: 0, member_name: memberName, project_name: projectName,
      })});
    }
    showToast('Allocation updated', 'success');
    markMutation();
    await loadAllData(true);
  } catch {}
}

function renderActuals(el) {

  const monthAllocs = [];
  for (let i = 0; i < state.allocations.length; i++) {
    if (state.allocations[i].period_month === selectedMonth) monthAllocs.push(state.allocations[i]);
  }

  const matrix = {};
  for (let i = 0; i < members.length; i++) matrix[members[i].id] = {};
  for (let i = 0; i < monthAllocs.length; i++) {
    const a = monthAllocs[i];
    if (matrix[a.member_id]) {
      matrix[a.member_id][a.project_id] = { actual: parseFloat(a.actual_hours) || 0, planned: parseFloat(a.planned_hours) || 0, id: a.id };
    }
  }

  const rowTotals = {};
  for (let i = 0; i < members.length; i++) {
    const m = members[i];
    let totalActual = 0, totalPlanned = 0;
    const projKeys = Object.keys(matrix[m.id] || {});

    }

                  const cellBg = cell && diff > 0 ? 'bg-red-50/50' : cell && diff < -10 ? 'bg-emerald-50/50' : '';
                  return `<td class="px-1 py-1 text-center ${cellBg}">
                    ${cell ? `<input type="number" min="0" max="999" value="${val || ''}" placeholder="—"
                      class="w-full text-center text-xs px-1 py-1.5 rounded border border-transparent hover:border-slate-200 focus:border-indigo-400 focus:outline-none focus:ring-1 focus:ring-indigo-400/30 transition-colors ${val > 0 ? 'font-medium text-slate-700' : 'text-slate-400'}"
                      onchange="updateActual('${cell.id}', this.value)">` : '<span class="text-xs text-slate-300">—</span>'}
                  </td>`;
                }).join('')}
                <td class="px-3 py-2.5 text-center font-semibold text-slate-900 bg-slate-50/50">${fmtNum(rt.actual)}</td>
                <td class="px-3 py-2.5 text-center text-slate-600 bg-slate-50/50">${fmtNum(rt.planned)}</td>
                <td class="px-3 py-2.5 text-center ${varianceClass} bg-slate-50/50">${rt.variance > 0 ? '+' : ''}${fmtNum(rt.variance)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

async function updateActual(allocId, value) {
  const hours = parseFloat(value) || 0;
  try {
    await api('allocations/' + allocId, { method: 'PUT', body: JSON.stringify({ actual_hours: hours }) });
    showToast('Actual hours updated', 'success');
    markMutation();
    await loadAllData(true);
  } catch {}
}

  for (let i = 0; i < snaps.length; i++) {

    if (c > maxCapacity) maxCapacity = c;
  }
  let maxRevenue = 0;
  for (let i = 0; i < snaps.length; i++) {
    const r = Math.max(parseFloat(snaps[i].planned_revenue) || 0, parseFloat(snaps[i].actual_revenue) || 0);
    if (r > maxRevenue) maxRevenue = r;

  // Project hours distribution

// ==================== HARVEST CSV IMPORT ====================
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  // Parse header
  const header = lines[0].split(',');
  const colMap = {};
  for (let i = 0; i < header.length; i++) {
    const h = header[i].trim().replace(/^"|"$/g, '').toLowerCase();
    if (h === 'project') colMap.project = i;
    else if (h === 'team member' || h === 'member' || h === 'name' || h === 'employee') colMap.member = i;
    else if (h === 'hours' || h === 'total hours' || h === 'actual hours') colMap.hours = i;
  }
  if (colMap.project === undefined || colMap.member === undefined || colMap.hours === undefined) return null;
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    // Simple CSV split handling quoted fields
    const fields = [];
    let current = '';
    let inQuotes = false;
    for (let j = 0; j < line.length; j++) {
      const ch = line[j];
      if (ch === '"') { inQuotes = !inQuotes; continue; }
      if (ch === ',' && !inQuotes) { fields.push(current.trim()); current = ''; continue; }
      current += ch;
    }
    fields.push(current.trim());
    const project = fields[colMap.project] || '';
    const member = fields[colMap.member] || '';
    const hours = parseFloat(fields[colMap.hours]) || 0;
    if (project && member && hours > 0) {
      rows.push({ project, member, hours });
    }
  }
  return rows;
}

function matchProjectByName(name) {
  const lower = name.toLowerCase().trim();
  for (let i = 0; i < state.projects.length; i++) {
    if (state.projects[i].name.toLowerCase().trim() === lower) return state.projects[i];
  }
  // Fuzzy: check if project name contains the search or vice versa
  for (let i = 0; i < state.projects.length; i++) {
    if (state.projects[i].name.toLowerCase().includes(lower) || lower.includes(state.projects[i].name.toLowerCase())) return state.projects[i];
  }
  return null;
}

function matchMemberByName(name) {
  const lower = name.toLowerCase().trim();
  for (let i = 0; i < state.teamMembers.length; i++) {
    const m = state.teamMembers[i];
    if (m.name.toLowerCase().trim() === lower) return m;
  }
  // Match by first name
  for (let i = 0; i < state.teamMembers.length; i++) {
    const m = state.teamMembers[i];
    const firstName = m.name.split(' ')[0].toLowerCase();
    if (firstName === lower || lower === firstName) return m;
  }
  // Partial match
  for (let i = 0; i < state.teamMembers.length; i++) {
    const m = state.teamMembers[i];
    if (m.name.toLowerCase().includes(lower) || lower.includes(m.name.toLowerCase())) return m;
  }
  return null;
}

function handleHarvestCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const rows = parseCSV(text);
    if (rows === null) {
      showToast('Invalid CSV format. Expected columns: Project, Team Member, Hours', 'error');
      input.value = '';
      return;
    }
    if (rows.length === 0) {
      showToast('No valid data rows found in CSV', 'warning');
      input.value = '';
      return;
    }
    // Match rows to projects and members
    const matched = [];
    const unmatched = [];
    for (let i = 0; i < rows.length; i++) {
      const r = rows[i];
      const project = matchProjectByName(r.project);
      const member = matchMemberByName(r.member);
      if (project && member) {
        matched.push({ ...r, projectMatch: project, memberMatch: member });
      } else {
        unmatched.push({ ...r, projectMatch: project, memberMatch: member });
      }
    }
    showHarvestPreview(matched, unmatched);
    input.value = '';
  };
  reader.readAsText(file);
}

function showHarvestPreview(matched, unmatched) {
  let body = '';
  if (matched.length > 0) {
    body += '<p class="text-sm font-semibold text-slate-700 mb-2">Matched Records (' + matched.length + ')</p>';
    body += '<div class="max-h-48 overflow-y-auto mb-4 border border-slate-200 rounded-lg">';
    body += '<table class="w-full text-xs">';
    body += '<thead><tr class="bg-slate-50 border-b border-slate-200"><th class="px-3 py-2 text-left font-semibold text-slate-500">Project</th><th class="px-3 py-2 text-left font-semibold text-slate-500">Member</th><th class="px-3 py-2 text-right font-semibold text-slate-500">Hours</th></tr></thead>';
    body += '<tbody>';
    for (let i = 0; i < matched.length; i++) {
      const r = matched[i];
      body += '<tr class="border-b border-slate-50"><td class="px-3 py-1.5 text-slate-700">' + esc(r.projectMatch.name) + '</td><td class="px-3 py-1.5 text-slate-700">' + esc(r.memberMatch.name) + '</td><td class="px-3 py-1.5 text-right font-medium text-slate-900">' + r.hours + 'h</td></tr>';
    }
    body += '</tbody></table></div>';
  }
  if (unmatched.length > 0) {
    body += '<p class="text-sm font-semibold text-amber-700 mb-2">Unmatched Records (' + unmatched.length + ') &mdash; will be skipped</p>';
    body += '<div class="max-h-32 overflow-y-auto mb-4 border border-amber-200 rounded-lg bg-amber-50/50">';
    body += '<table class="w-full text-xs">';
    body += '<thead><tr class="bg-amber-50 border-b border-amber-200"><th class="px-3 py-2 text-left font-semibold text-amber-600">Project</th><th class="px-3 py-2 text-left font-semibold text-amber-600">Member</th><th class="px-3 py-2 text-right font-semibold text-amber-600">Hours</th><th class="px-3 py-2 text-left font-semibold text-amber-600">Issue</th></tr></thead>';
    body += '<tbody>';
    for (let i = 0; i < unmatched.length; i++) {
      const r = unmatched[i];
      const issue = !r.projectMatch ? 'Project not found' : 'Member not found';
      body += '<tr class="border-b border-amber-100"><td class="px-3 py-1.5 text-amber-800">' + esc(r.project) + '</td><td class="px-3 py-1.5 text-amber-800">' + esc(r.member) + '</td><td class="px-3 py-1.5 text-right font-medium text-amber-900">' + r.hours + 'h</td><td class="px-3 py-1.5 text-amber-600 italic">' + issue + '</td></tr>';
    }
    body += '</tbody></table></div>';
  }
  if (matched.length === 0) {
    body += '<p class="text-sm text-red-600">No records could be matched to existing projects and team members.</p>';
    showModal('Harvest Import Preview', body,
      '<button onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">Close</button>');
    return;
  }
  const totalHours = matched.reduce(function(s, r) { return s + r.hours; }, 0);
  body += '<p class="text-xs text-slate-500">Total: <strong>' + fmtNum(totalHours) + ' hours</strong> across ' + matched.length + ' allocations for <strong>' + state.actualsMonth + '</strong></p>';

  // Store matched data globally for the confirm action
  window.__harvestImportData = matched;

  showModal('Harvest Import Preview', body,
    '<button onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">Cancel</button>' +
    '<button onclick="confirmHarvestImport()" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors">Import ' + matched.length + ' Records</button>');
}

async function confirmHarvestImport() {
  const matched = window.__harvestImportData || [];
  if (matched.length === 0) { closeModal(); return; }
  closeModal();
  const month = state.actualsMonth;
  let successCount = 0;
  let errorCount = 0;

  // Build a map of existing allocations for this month
  const existingMap = {};
  for (let i = 0; i < state.allocations.length; i++) {
    const a = state.allocations[i];
    if (a.period_month === month) {
      existingMap[a.member_id + '::' + a.project_id] = a;
    }
  }

  for (let i = 0; i < matched.length; i++) {
    const r = matched[i];
    const key = r.memberMatch.id + '::' + r.projectMatch.id;
    const existing = existingMap[key];
    try {
      if (existing) {
        await api('allocations/' + existing.id, {
          method: 'PUT',
          body: JSON.stringify({ actual_hours: r.hours }),
        });
      } else {
        await api('allocations', {
          method: 'POST',
          body: JSON.stringify({
            member_id: r.memberMatch.id,
            project_id: r.projectMatch.id,
            period_month: month,
            planned_hours: 0,
            actual_hours: r.hours,
            member_name: r.memberMatch.name,
            project_name: r.projectMatch.name,
          }),
        });
      }
      successCount++;
    } catch (e) {
      errorCount++;
    }
  }

  if (errorCount > 0) {
    showToast('Imported ' + successCount + ' records, ' + errorCount + ' failed', 'warning');
  } else {
    showToast('Successfully imported ' + successCount + ' records from Harvest', 'success');
  }
  window.__harvestImportData = null;
  markMutation();
  await loadAllData(true);
}

// ==================== PLANNING CONTROLS ====================
let _planSaveTimers = {};
function planCellAdjust(memberId, projectId, month, memberName, projectName, existingId, delta) {
  const cellId = 'plan-cell-' + memberId + '-' + projectId;
  const inputEl = document.getElementById(cellId);
  if (!inputEl) return;
  let val = parseFloat(inputEl.value) || 0;
  val = Math.max(0, val + delta);
  inputEl.value = val > 0 ? val : '';
  // Update visual style
  if (val > 0) {
    inputEl.classList.add('bg-indigo-50/50', 'font-medium', 'text-indigo-700');
    inputEl.classList.remove('text-slate-400');
  } else {
    inputEl.classList.remove('bg-indigo-50/50', 'font-medium', 'text-indigo-700');
    inputEl.classList.add('text-slate-400');
  }
  // Determine utilization color for this cell
  updatePlanCellColor(memberId, projectId, val);
  // Recalculate row totals immediately
  updatePlanningRowTotal(memberId);
  // Debounced save
  const timerKey = memberId + '::' + projectId;
  if (_planSaveTimers[timerKey]) clearTimeout(_planSaveTimers[timerKey]);
  _planSaveTimers[timerKey] = setTimeout(function() {
    planCellSave(memberId, projectId, month, val, memberName, projectName, existingId, cellId);
  }, 500);
}

function planCellChange(memberId, projectId, month, memberName, projectName, existingId) {
  const cellId = 'plan-cell-' + memberId + '-' + projectId;
  const inputEl = document.getElementById(cellId);
  if (!inputEl) return;
  const val = parseFloat(inputEl.value) || 0;
  updatePlanCellColor(memberId, projectId, val);
  updatePlanningRowTotal(memberId);
  const timerKey = memberId + '::' + projectId;
  if (_planSaveTimers[timerKey]) clearTimeout(_planSaveTimers[timerKey]);
  _planSaveTimers[timerKey] = setTimeout(function() {
    planCellSave(memberId, projectId, month, val, memberName, projectName, existingId, cellId);
  }, 500);
}

function updatePlanCellColor(memberId, projectId, val) {
  const wrapper = document.getElementById('plan-wrap-' + memberId + '-' + projectId);
  if (!wrapper) return;
  // Compute this member's total hours across all projects
  let memberTotal = 0;
  const memberCells = document.querySelectorAll('[data-plan-member="' + memberId + '"]');
  for (let i = 0; i < memberCells.length; i++) {
    memberTotal += parseFloat(memberCells[i].value) || 0;
  }
  // Find member capacity
  let capacity = 160;
  for (let i = 0; i < state.teamMembers.length; i++) {
    if (state.teamMembers[i].id === memberId) {
      capacity = parseFloat(state.teamMembers[i].monthly_capacity) || 160;
      break;
    }
  }
  const utilPct = capacity > 0 ? (memberTotal / capacity * 100) : 0;
  // Remove old color classes
  wrapper.classList.remove('bg-emerald-50', 'bg-amber-50', 'bg-red-50');
  if (val > 0) {
    if (utilPct >= 95) wrapper.classList.add('bg-red-50');
    else if (utilPct >= 85) wrapper.classList.add('bg-amber-50');
    else wrapper.classList.add('bg-emerald-50');
  }
}

function updatePlanningRowTotal(memberId) {
  const cells = document.querySelectorAll('[data-plan-member="' + memberId + '"]');
  let total = 0;
  for (let i = 0; i < cells.length; i++) {
    total += parseFloat(cells[i].value) || 0;
  }
  let capacity = 160;
  for (let i = 0; i < state.teamMembers.length; i++) {
    if (state.teamMembers[i].id === memberId) {
      capacity = parseFloat(state.teamMembers[i].monthly_capacity) || 160;
      break;
    }
  }
  const variance = capacity - total;
  const utilPct = capacity > 0 ? (total / capacity * 100) : 0;
  const plannedEl = document.getElementById('plan-total-' + memberId);
  const varianceEl = document.getElementById('plan-variance-' + memberId);
  const utilEl = document.getElementById('plan-util-' + memberId);
  if (plannedEl) plannedEl.textContent = fmtNum(total);
  if (varianceEl) {
    varianceEl.textContent = (variance > 0 ? '+' : '') + fmtNum(variance);
    varianceEl.className = 'px-3 py-2.5 text-center bg-slate-50/50 ' + (variance < 0 ? 'text-red-600 font-semibold' : 'text-emerald-600');
  }
  if (utilEl) {
    utilEl.textContent = fmtPct(utilPct);
    const utilClass = utilPct >= 95 ? 'text-red-600 font-bold' : utilPct >= 85 ? 'text-amber-600 font-semibold' : utilPct >= 70 ? 'text-emerald-600' : 'text-slate-500';
    utilEl.className = 'px-3 py-2.5 text-center bg-slate-50/50 ' + utilClass;
  }
  // Update all cell colors for this member
  const allWraps = document.querySelectorAll('[data-plan-wrap-member="' + memberId + '"]');
  for (let i = 0; i < allWraps.length; i++) {
    const cellInput = allWraps[i].querySelector('input');
    const cellVal = cellInput ? parseFloat(cellInput.value) || 0 : 0;
    allWraps[i].classList.remove('bg-emerald-50', 'bg-amber-50', 'bg-red-50');
    if (cellVal > 0) {
      if (utilPct >= 95) allWraps[i].classList.add('bg-red-50');
      else if (utilPct >= 85) allWraps[i].classList.add('bg-amber-50');
      else allWraps[i].classList.add('bg-emerald-50');
    }
  }
}

async function planCellSave(memberId, projectId, month, hours, memberName, projectName, existingId, cellId) {
  const wrapper = document.getElementById('plan-wrap-' + memberId + '-' + projectId);
  // Pulse animation to indicate saving
  if (wrapper) {
    wrapper.style.transition = 'opacity 0.15s ease';
    wrapper.style.opacity = '0.5';
    setTimeout(function() { if (wrapper) wrapper.style.opacity = '1'; }, 300);
  }
  try {
    if (existingId && hours > 0) {
      await api('allocations/' + existingId, { method: 'PUT', body: JSON.stringify({ planned_hours: hours }) });
    } else if (existingId && hours === 0) {
      await api('allocations/' + existingId, { method: 'DELETE' });
    } else if (hours > 0) {
      await api('allocations', { method: 'POST', body: JSON.stringify({
        member_id: memberId, project_id: projectId, period_month: month,
        planned_hours: hours, actual_hours: 0, member_name: memberName, project_name: projectName,
      })});
    }
    markMutation();
    await loadAllData(true);
  } catch {}
}

// ==================== INIT ====================
loadAllData().then(() => render());
</script>
